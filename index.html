<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fonte di Energia — Fosforo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a1420;
    color: #e8dcc8;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 20px;
    overflow-x: hidden;
  }

  h1, .grid-title {
    font-family: 'Montserrat', system-ui, sans-serif;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #f0e6d4;
    text-shadow: 0 2px 12px rgba(240,200,120,0.15);
    margin: 0;
  }

  .subtitle {
    font-size: clamp(0.75rem, 1.5vw, 0.95rem);
    color: #8a7e6e;
    text-align: center;
    margin-bottom: 10px;
  }

  .grid-outer {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: min(960px, calc(100vh * 1.15));
    width: 100%;
  }

  .grid-row-area {
    display: flex;
    align-items: stretch;
    width: 100%;
  }

  .grid-wrapper {
    display: grid;
    grid-template-columns: auto repeat(5, 1fr);
    grid-template-rows: auto repeat(5, 1fr);
    gap: 3px;
    flex: 1;
    min-width: 0;
  }

  /* Header cella vuota (angolo) */
  .corner {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Header colonne */
  .col-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px 4px;
    text-align: center;
    font-size: clamp(0.55rem, 1.1vw, 0.8rem);
    line-height: 1.2;
    color: #c0b8a8;
  }
  .col-header .label-small {
    font-size: clamp(0.45rem, 0.9vw, 0.65rem);
    color: #7a7060;
    margin-bottom: 2px;
  }
  .col-header .label-big {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Header righe */
  .row-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px 8px;
    text-align: center;
    font-size: clamp(0.55rem, 1.1vw, 0.8rem);
    line-height: 1.2;
    color: #c0b8a8;
    min-width: 80px;
  }
  .row-header .label-small {
    font-size: clamp(0.45rem, 0.9vw, 0.65rem);
    color: #7a7060;
    margin-bottom: 2px;
  }
  .row-header .label-big {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Cella della griglia */
  .cell {
    position: relative;
    width: 100%;
    aspect-ratio: 191 / 135;
    perspective: 800px;
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
  }

  .cell.diagonal {
    background: #0e2a3e;
    cursor: default;
    border: 1px solid #1a3a52;
  }

  .cell-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }

  .cell.flipped .cell-inner {
    transform: rotateY(180deg);
  }

  .cell-front, .cell-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 6px;
    overflow: hidden;
  }

  .cell-front {
    background: #d4b896;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #b89a70;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.15);
  }

  .cell-front .question-mark {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: #6b5a42;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    user-select: none;
    font-style: italic;
    font-family: Georgia, "Times New Roman", serif;
  }

  .cell-back {
    transform: rotateY(180deg);
    background: #1a2a3a;
    border: 2px solid #2a4a62;
  }

  .cell-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .cell:not(.diagonal):not(.flipped):hover .cell-front {
    background: #dcc8a8;
    border-color: #c8a870;
    box-shadow: 0 0 15px rgba(200,168,112,0.3), inset 0 2px 8px rgba(0,0,0,0.1);
  }

  .cell:not(.diagonal):not(.flipped):hover .question-mark {
    color: #5a4832;
    transform: scale(1.1);
    transition: transform 0.2s;
  }

  /* Controlli */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .counter {
    font-size: clamp(0.85rem, 1.5vw, 1.1rem);
    color: #a09080;
    font-variant-numeric: tabular-nums;
    min-width: 100px;
    text-align: center;
  }
  .counter strong {
    color: #f0d8a0;
    font-size: 1.3em;
  }

  button {
    background: #1a3048;
    color: #c8b89a;
    border: 1px solid #2a4a60;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: clamp(0.75rem, 1.2vw, 0.9rem);
    font-family: inherit;
    transition: all 0.2s;
  }
  button:hover {
    background: #243e58;
    border-color: #3a6080;
    color: #f0e0c0;
  }
  button:active {
    transform: scale(0.97);
  }

  /* Messaggio completamento */
  .complete-msg {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,20,32,0.85);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .complete-msg.show {
    opacity: 1;
    pointer-events: auto;
  }
  .complete-msg .inner {
    text-align: center;
    padding: 40px;
    background: #12283e;
    border: 2px solid #2a5070;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(42,80,112,0.4);
    max-width: 400px;
  }
  .complete-msg h2 {
    font-size: 1.8rem;
    color: #f0d8a0;
    margin-bottom: 12px;
  }
  .complete-msg p {
    color: #a0b0c0;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* Side label */
  .side-label {
    display: none;
    align-items: center;
    justify-content: center;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    font-family: 'Montserrat', system-ui, sans-serif;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #f0e6d4;
    white-space: nowrap;
    padding: 0 8px;
    flex-shrink: 0;
  }

  @media (min-width: 700px) {
    .side-label { display: flex; }
  }

  .fosforo-credit {
    margin-top: 16px;
    font-size: 0.7rem;
    color: #504838;
    text-align: center;
  }
</style>
</head>
<body>

<div class="grid-outer">
  <h1 id="main-title">Fonte di Energia</h1>
  <div class="grid-row-area">
    <div class="side-label" id="side-label">Energia Ottenuta</div>
    <div class="grid-wrapper" role="grid" aria-label="Tabella trasformazioni energetiche">
      <!-- Corner -->
      <div class="corner" role="columnheader"></div>
      <!-- Column headers -->
      <div class="col-header" role="columnheader"><span class="label-small">energia</span><span class="label-big">Elettrica</span></div>
      <div class="col-header" role="columnheader"><span class="label-small">energia</span><span class="label-big">Meccanica</span></div>
      <div class="col-header" role="columnheader"><span class="label-small">energia</span><span class="label-big">Chimica</span></div>
      <div class="col-header" role="columnheader"><span class="label-small">energia</span><span class="label-big">Termica</span></div>
      <div class="col-header" role="columnheader"><span class="label-small">energia</span><span class="label-big">Luminosa</span></div>
    </div>
  </div>
</div>

<div class="controls">
  <div class="counter"><strong id="count">0</strong> / 20</div>
  <button id="btn-reveal" type="button">Scopri tutte</button>
  <button id="btn-reset" type="button">Reset</button>
</div>

<!-- Completamento overlay -->
<div class="complete-msg" id="complete-overlay">
  <div class="inner">
    <h2>Complimenti!</h2>
    <p>Hai scoperto tutte le 20 trasformazioni energetiche!</p>
    <button id="btn-close" type="button">Chiudi</button>
  </div>
</div>

};

const CELL_DESCS = {
    "0-1": "Dinamo a manovella",
    "0-2": "Batteria",
    "0-3": "Termocoppia",
    "0-4": "Pannello solare",
    "1-0": "Motore elettrico",
    "1-2": "Muscolo (braccio)",
    "1-3": "Macchina a vapore",
    "1-4": "Radiometro di Crookes",
    "2-0": "Caricabatterie / Elettrolisi",
    "2-1": "Barile di petrolio",
    "2-3": "Siringa / Reazione endotermica",
    "2-4": "Fotosintesi",
    "3-0": "Stufetta elettrica",
    "3-1": "Lampadina",
    "3-2": "Fuoco / Combustione",
    "3-4": "Termometro al sole",
    "4-0": "Torcia elettrica",
    "4-1": "Acciarino / Pietra focaia",
    "4-2": "Candela",
    "4-3": "Fuochi d'artificio"
};

const ENERGY = ["Elettrica", "Meccanica", "Chimica", "Termica", "Luminosa"];
const TOTAL = 20;
let revealed = new Set();

const grid = document.querySelector(".grid-wrapper");
const counter = document.getElementById("count");
const overlay = document.getElementById("complete-overlay");

// Genera righe
for (let r = 0; r < 5; r++) {
  // Row header
  const rh = document.createElement("div");
  rh.className = "row-header";
  rh.setAttribute("role", "rowheader");
  rh.innerHTML = '<span class="label-small">energia</span><span class="label-big">' + ENERGY[r] + '</span>';
  grid.appendChild(rh);

  // 5 celle
  for (let c = 0; c < 5; c++) {
    const cell = document.createElement("div");
    cell.className = "cell" + (r === c ? " diagonal" : "");
    cell.dataset.row = r;
    cell.dataset.col = c;
    const key = r + "-" + c;
    const desc = CELL_DESCS[key] || "";

    if (r === c) {
      cell.setAttribute("role", "gridcell");
      cell.setAttribute("aria-label", "Stessa energia: " + ENERGY[r]);
    } else {
      cell.setAttribute("role", "gridcell");
      cell.setAttribute("aria-label", "Da " + ENERGY[c] + " a " + ENERGY[r] + ": " + desc + " (coperta)");
      cell.setAttribute("tabindex", "0");

      const inner = document.createElement("div");
      inner.className = "cell-inner";

      const front = document.createElement("div");
      front.className = "cell-front";
      front.innerHTML = '<span class="question-mark">?</span>';

      const back = document.createElement("div");
      back.className = "cell-back";
      const img = document.createElement("img");
      img.src = "data:image/jpeg;base64," + CELL_IMAGES[key];
      img.alt = desc;
      img.loading = "lazy";
      back.appendChild(img);

      inner.appendChild(front);
      inner.appendChild(back);
      cell.appendChild(inner);

      cell.addEventListener("click", () => toggleCell(cell, key, desc));
      cell.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          toggleCell(cell, key, desc);
        }
      });
    }

    grid.appendChild(cell);
  }
}

function toggleCell(cell, key, desc) {
  const r = parseInt(cell.dataset.row);
  const c = parseInt(cell.dataset.col);

  if (cell.classList.contains("flipped")) {
    // Richiudi
    cell.classList.remove("flipped");
    revealed.delete(key);
    counter.textContent = revealed.size;
    cell.setAttribute("aria-label", "Da " + ENERGY[c] + " a " + ENERGY[r] + ": " + desc + " (coperta)");
  } else {
    // Apri
    cell.classList.add("flipped");
    revealed.add(key);
    counter.textContent = revealed.size;
    cell.setAttribute("aria-label", "Da " + ENERGY[c] + " a " + ENERGY[r] + ": " + desc);

    if (revealed.size === TOTAL) {
      setTimeout(() => overlay.classList.add("show"), 600);
    }
  }
}

function revealAll() {
  const cells = document.querySelectorAll(".cell:not(.diagonal):not(.flipped)");
  const total = cells.length;
  cells.forEach((cell, i) => {
    setTimeout(() => {
      const key = cell.dataset.row + "-" + cell.dataset.col;
      const desc = CELL_DESCS[key] || "";
      toggleCell(cell, key, desc);
      // Mostra overlay dopo l'ultima cella della cascata
      if (i === total - 1 && revealed.size === TOTAL) {
        setTimeout(() => overlay.classList.add("show"), 600);
      }
    }, i * 80);
  });
}

function resetAll() {
  overlay.classList.remove("show");
  revealed.clear();
  counter.textContent = "0";
  document.querySelectorAll(".cell.flipped").forEach(cell => {
    cell.classList.remove("flipped");
    const r = parseInt(cell.dataset.row);
    const c = parseInt(cell.dataset.col);
    const key = r + "-" + c;
    const desc = CELL_DESCS[key] || "";
    cell.setAttribute("aria-label", "Da " + ENERGY[c] + " a " + ENERGY[r] + ": " + desc + " (coperta)");
  });
}

document.getElementById("btn-reveal").addEventListener("click", revealAll);
document.getElementById("btn-reset").addEventListener("click", resetAll);
document.getElementById("btn-close").addEventListener("click", () => overlay.classList.remove("show"));

// Centra titolo sulle colonne dati e side-label sulle righe dati
function alignLabels() {
  const sideLabel = document.getElementById("side-label");
  const title = document.getElementById("main-title");
  const corner = document.querySelector(".corner");
  const firstHeader = document.querySelector(".col-header");
  const rowHeader = document.querySelector(".row-header");
  if (!corner || !firstHeader || !rowHeader) return;

  // Offset titolo: side-label width + row-header width
  const sideW = sideLabel && getComputedStyle(sideLabel).display !== "none" ? sideLabel.offsetWidth : 0;
  const rhW = rowHeader.offsetWidth;
  title.style.paddingLeft = (sideW + rhW) + "px";

  // Offset side-label: col-header height
  if (sideLabel && getComputedStyle(sideLabel).display !== "none") {
    const headerH = corner.offsetHeight;
    sideLabel.style.paddingBottom = headerH + "px";
  }
}
requestAnimationFrame(alignLabels);
window.addEventListener("resize", alignLabels);
</script>
